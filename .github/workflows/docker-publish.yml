name: Docker Build & Push.

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/docker-publish.yml

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: docker.io

jobs:
  build-backend:
    name: Backend / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - chat-service
          - network-service
          - notification-service
          - ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME || 'navi-ci' }}/navi-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: ${{ matrix.service }}
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}

  build-frontend:
    name: Frontend / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-app
            dockerfile: user/Dockerfile
            image: navi-user-app
          - name: admin-app
            dockerfile: admin/Dockerfile
            image: navi-admin-app
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000/api' }}
      VITE_WS_ORIGIN: ${{ secrets.VITE_WS_ORIGIN || 'http://localhost:3000' }}
      VITE_ENABLE_OAUTH: ${{ secrets.VITE_ENABLE_OAUTH || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME || 'navi-ci' }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_WS_ORIGIN=${{ env.VITE_WS_ORIGIN }}
            VITE_ENABLE_OAUTH=${{ env.VITE_ENABLE_OAUTH }}
          cache-from: type=gha,scope=frontend-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.name }}
