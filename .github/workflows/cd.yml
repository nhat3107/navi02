name: CD

# Manual deploy: Actions → CD. Always deploys Docker images tagged `latest`.
# Prerequisite: CI pushed app images to Docker Hub on main.
# HTTP only (no TLS in cluster). Use http:// hosts in secrets; terminate TLS at an external LB if needed.
# FRONTEND_ORIGIN: comma-separated user + admin app URLs (e.g. http://app.example.com,http://admin.example.com).
# OAuth callbacks: http://<API_HOST>/auth/google/callback (no /api prefix).

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Build and push db-init
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile.db-init
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/navi-db-init:${{ env.IMAGE_TAG }}

      - name: Write deploy values
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          API_HOST: ${{ secrets.API_HOST }}
          USER_APP_HOST: ${{ secrets.USER_APP_HOST }}
          ADMIN_APP_HOST: ${{ secrets.ADMIN_APP_HOST }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}
          USER_DATABASE_URL: ${{ secrets.USER_DATABASE_URL }}
          CHAT_DATABASE_URL: ${{ secrets.CHAT_DATABASE_URL }}
          NETWORK_DATABASE_URL: ${{ secrets.NETWORK_DATABASE_URL }}
          NOTIFICATION_DATABASE_URL: ${{ secrets.NOTIFICATION_DATABASE_URL }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          OAUTH_FRONTEND_LOGIN_URL: ${{ secrets.OAUTH_FRONTEND_LOGIN_URL }}
          OAUTH_FRONTEND_REDIRECT_URL: ${{ secrets.OAUTH_FRONTEND_REDIRECT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_CALLBACK_URL: ${{ secrets.GH_CALLBACK_URL }}
          VIDEOSDK_API_KEY: ${{ secrets.VIDEOSDK_API_KEY }}
          VIDEOSDK_SECRET: ${{ secrets.VIDEOSDK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          cat > /tmp/cd-values.yaml <<EOF
          namespace: ${NS}
          image:
            registry: ${DOCKERHUB_USERNAME}
            tag: latest
          ingress:
            apiHost: ${API_HOST}
            userAppHost: ${USER_APP_HOST}
            adminAppHost: ${ADMIN_APP_HOST}
          secrets:
            JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
            JWT_RESET_SECRET: "${JWT_RESET_SECRET}"
            AUTH_DATABASE_URL: "${AUTH_DATABASE_URL}"
            USER_DATABASE_URL: "${USER_DATABASE_URL}"
            CHAT_DATABASE_URL: "${CHAT_DATABASE_URL}"
            NETWORK_DATABASE_URL: "${NETWORK_DATABASE_URL}"
            NOTIFICATION_DATABASE_URL: "${NOTIFICATION_DATABASE_URL}"
            FRONTEND_ORIGIN: "${FRONTEND_ORIGIN}"
            OAUTH_FRONTEND_LOGIN_URL: "${OAUTH_FRONTEND_LOGIN_URL}"
            OAUTH_FRONTEND_REDIRECT_URL: "${OAUTH_FRONTEND_REDIRECT_URL}"
            GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
            GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
            GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL}"
            GH_CLIENT_ID: "${GH_CLIENT_ID}"
            GH_CLIENT_SECRET: "${GH_CLIENT_SECRET}"
            GH_CALLBACK_URL: "${GH_CALLBACK_URL}"
            VIDEOSDK_API_KEY: "${VIDEOSDK_API_KEY}"
            VIDEOSDK_SECRET: "${VIDEOSDK_SECRET}"
            EMAIL_USER: "${EMAIL_USER}"
            EMAIL_PASS: "${EMAIL_PASS}"
            FRONTEND_URL: "${FRONTEND_URL}"
            CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME}"
            CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
            CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
            OPENAI_API_KEY: "${OPENAI_API_KEY}"
          EOF

      - name: Helm lint
        run: helm lint ./helm/navi -f helm/navi/values.yaml -f /tmp/cd-values.yaml

      - name: Helm upgrade
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          helm upgrade --install navi ./helm/navi \
            --namespace "${NS}" \
            --create-namespace \
            -f helm/navi/values.yaml \
            -f /tmp/cd-values.yaml \
            --wait --timeout 15m

      - name: Wait for db-init
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          if kubectl get job navi-db-init -n "${NS}" >/dev/null 2>&1; then
            kubectl wait --for=condition=complete job/navi-db-init \
              -n "${NS}" --timeout=300s
          fi
