name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: docker.io

jobs:
  backend-test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run unit tests
        run: npm test -- --verbose

  frontend-user-test:
    name: Frontend user unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/user
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/user/package-lock.json
      - run: npm ci
      - name: Run unit tests
        run: npm test -- --reporter=verbose

  build-backend:
    name: Backend / ${{ matrix.service }}
    needs: [backend-test, frontend-user-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - chat-service
          - network-service
          - notification-service
          - ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME || 'navi-ci' }}/navi-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: ${{ matrix.service }}
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}

  validate-frontend-config:
    name: Validate frontend build secrets
    needs: [backend-test, frontend-user-test]
    runs-on: ubuntu-latest
    outputs:
      vite_api_url: ${{ steps.vite.outputs.api_url }}
      vite_ws_origin: ${{ steps.vite.outputs.ws_origin }}
    steps:
      - name: Resolve and validate VITE URLs
        id: vite
        env:
          API_HOST: ${{ secrets.API_HOST }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_ORIGIN: ${{ secrets.VITE_WS_ORIGIN }}
        run: |
          api_url="${VITE_API_URL:-}"
          ws_origin="${VITE_WS_ORIGIN:-}"
          if [ -z "$api_url" ] && [ -n "${API_HOST:-}" ]; then
            api_url="https://${API_HOST}/api"
          fi
          if [ -z "$ws_origin" ] && [ -n "${API_HOST:-}" ]; then
            ws_origin="https://${API_HOST}"
          fi
          # Production frontends are served over HTTPS — never bake http:// API URLs.
          case "$api_url" in
            http://*) api_url="https://${api_url#http://}" ;;
          esac
          case "$ws_origin" in
            http://*) ws_origin="https://${ws_origin#http://}" ;;
          esac

          missing=0
          for key in api_url ws_origin; do
            eval "val=\$$key"
            if [ -z "$val" ]; then
              echo "::error::Set GitHub secrets VITE_API_URL + VITE_WS_ORIGIN, or API_HOST (e.g. api.example.com)"
              missing=1
            elif echo "$val" | grep -qi localhost; then
              echo "::error::$key must not use localhost on main — use https://<API_HOST>/api and https://<API_HOST>"
              missing=1
            elif echo "$val" | grep -qE '^http://'; then
              echo "::error::$key must use https:// in production (got $val)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Resolved VITE_API_URL=$api_url"
          echo "Resolved VITE_WS_ORIGIN=$ws_origin"
          echo "api_url=$api_url" >> "$GITHUB_OUTPUT"
          echo "ws_origin=$ws_origin" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Frontend / ${{ matrix.name }}
    needs: [validate-frontend-config]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-app
            dockerfile: user/Dockerfile
            image: navi-user-app
          - name: admin-app
            dockerfile: admin/Dockerfile
            image: navi-admin-app
    env:
      VITE_API_URL: ${{ needs.validate-frontend-config.outputs.vite_api_url }}
      VITE_WS_ORIGIN: ${{ needs.validate-frontend-config.outputs.vite_ws_origin }}
      VITE_ENABLE_OAUTH: ${{ secrets.VITE_ENABLE_OAUTH || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME || 'navi-ci' }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_WS_ORIGIN=${{ env.VITE_WS_ORIGIN }}
            VITE_ENABLE_OAUTH=${{ env.VITE_ENABLE_OAUTH }}
          cache-from: type=gha,scope=frontend-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.name }}
