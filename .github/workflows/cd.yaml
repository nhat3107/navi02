name: CD

# Manual deploy — pulls app images tagged \`latest\` (pushed by CI on main).
on:
  workflow_dispatch:
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Write deploy values
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_STAMP: ${{ github.run_id }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          API_HOST: ${{ secrets.API_HOST }}
          USER_APP_HOST: ${{ secrets.USER_APP_HOST }}
          ADMIN_APP_HOST: ${{ secrets.ADMIN_APP_HOST }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}
          USER_DATABASE_URL: ${{ secrets.USER_DATABASE_URL }}
          CHAT_DATABASE_URL: ${{ secrets.CHAT_DATABASE_URL }}
          NETWORK_DATABASE_URL: ${{ secrets.NETWORK_DATABASE_URL }}
          NOTIFICATION_DATABASE_URL: ${{ secrets.NOTIFICATION_DATABASE_URL }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          OAUTH_FRONTEND_LOGIN_URL: ${{ secrets.OAUTH_FRONTEND_LOGIN_URL }}
          OAUTH_FRONTEND_REDIRECT_URL: ${{ secrets.OAUTH_FRONTEND_REDIRECT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_CALLBACK_URL: ${{ secrets.GH_CALLBACK_URL }}
          VIDEOSDK_API_KEY: ${{ secrets.VIDEOSDK_API_KEY }}
          VIDEOSDK_SECRET: ${{ secrets.VIDEOSDK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ADMIN_SEED_EMAIL: ${{ secrets.ADMIN_SEED_EMAIL }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}
        run: |
          sed -i 's/\r$//' helm/navi/render-deploy-values.sh
          sh helm/navi/render-deploy-values.sh > deploy-values.yaml

      - name: Helm lint
        run: |
          helm lint helm/navi -f helm/navi/values.yaml -f deploy-values.yaml

      - name: Deploy
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          kubectl --insecure-skip-tls-verify delete pods -n "${NS}" \
            --field-selector status.phase=Failed \
            --ignore-not-found --grace-period=0 2>/dev/null || true
          helm upgrade --install navi helm/navi \
            --kube-insecure-skip-tls-verify \
            --namespace "${NS}" \
            --create-namespace \
            -f helm/navi/values.yaml \
            -f deploy-values.yaml \
            --wait --timeout 15m

      - name: Rollout restart app deployments
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          KUBECTL="kubectl --insecure-skip-tls-verify"
          for dep in broker api-gateway auth-service user-service chat-service network-service notification-service ai-service user-app admin-app; do
            $KUBECTL rollout restart "deployment/${dep}" -n "${NS}" || true
          done
          for dep in broker api-gateway auth-service user-service chat-service network-service notification-service ai-service user-app admin-app; do
            $KUBECTL rollout status "deployment/${dep}" -n "${NS}" --timeout=10m || true
          done

      - name: Show pods
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          kubectl --insecure-skip-tls-verify get pods -n "${K8S_NAMESPACE:-navi}"
