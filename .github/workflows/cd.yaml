name: CD

# Manual deploy: Actions → CD → Run workflow.
# Prerequisite: CI has pushed app images to Docker Hub (tag `latest`).
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#   K3S_HOST, K3S_USER, K3S_SSH_KEY, K3S_REPO_PATH
#   JWT_ACCESS_SECRET, JWT_RESET_SECRET

on:
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push db-init
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile.db-init
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/navi-db-init:${{ env.IMAGE_TAG }}

      - name: Write deploy values
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}
          USER_DATABASE_URL: ${{ secrets.USER_DATABASE_URL }}
          CHAT_DATABASE_URL: ${{ secrets.CHAT_DATABASE_URL }}
          NETWORK_DATABASE_URL: ${{ secrets.NETWORK_DATABASE_URL }}
          NOTIFICATION_DATABASE_URL: ${{ secrets.NOTIFICATION_DATABASE_URL }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          OAUTH_FRONTEND_LOGIN_URL: ${{ secrets.OAUTH_FRONTEND_LOGIN_URL }}
          OAUTH_FRONTEND_REDIRECT_URL: ${{ secrets.OAUTH_FRONTEND_REDIRECT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_CALLBACK_URL: ${{ secrets.GH_CALLBACK_URL }}
          VIDEOSDK_API_KEY: ${{ secrets.VIDEOSDK_API_KEY }}
          VIDEOSDK_SECRET: ${{ secrets.VIDEOSDK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sed -i 's/\r$//' helm/navi/render-deploy-values.sh
          sh helm/navi/render-deploy-values.sh > deploy-values.yaml

      - name: Copy deploy values to K3s server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          source: deploy-values.yaml
          target: /tmp/

      - name: Deploy to K3s with Helm
        uses: appleboy/ssh-action@v1.2.0
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          envs: K8S_NAMESPACE
          script: |
            set -euo pipefail
            REPO="${{ secrets.K3S_REPO_PATH }}"
            NS="${K8S_NAMESPACE:-navi}"

            cd "${REPO}"
            git fetch origin main
            git checkout main
            git pull origin main

            helm upgrade --install navi ./helm/navi \
              --namespace "${NS}" \
              --create-namespace \
              -f helm/navi/values.yaml \
              -f /tmp/deploy-values.yaml \
              --wait --timeout 15m

            if kubectl get job navi-db-init -n "${NS}" >/dev/null 2>&1; then
              kubectl wait --for=condition=complete job/navi-db-init \
                -n "${NS}" --timeout=300s || true
            fi

            kubectl get pods -n "${NS}"
