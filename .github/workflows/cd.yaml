name: CD

# Manual deploy: Actions → CD → Run workflow.
# Prerequisite: CI has pushed app images to Docker Hub (tag `latest`).
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#   KUBE_CONFIG (raw kubeconfig YAML or base64-encoded)
#   JWT_ACCESS_SECRET, JWT_RESET_SECRET

on:
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -eu
          if [ -z "${KUBE_CONFIG:-}" ]; then
            echo "::error::KUBE_CONFIG secret is empty"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          CONFIG="$HOME/.kube/config"
          KUBE_CLEAN="$(printf '%s' "$KUBE_CONFIG" | tr -d '\r')"
          if printf '%s' "$KUBE_CLEAN" | grep -q '^apiVersion:'; then
            printf '%s' "$KUBE_CLEAN" > "$CONFIG"
          else
            printf '%s' "$KUBE_CLEAN" | base64 -d > "$CONFIG"
          fi
          chmod 600 "$CONFIG"
          if ! grep -q '^apiVersion:' "$CONFIG"; then
            echo "::error::KUBE_CONFIG is not valid kubeconfig YAML"
            exit 1
          fi
          SERVER="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)"
          echo "API server: ${SERVER:-unknown}"
          kubectl cluster-info
          kubectl get ns >/dev/null
          echo "Cluster connection OK"

      - name: Build and push db-init
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile.db-init
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/navi-db-init:${{ env.IMAGE_TAG }}

      - name: Write deploy values
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}
          USER_DATABASE_URL: ${{ secrets.USER_DATABASE_URL }}
          CHAT_DATABASE_URL: ${{ secrets.CHAT_DATABASE_URL }}
          NETWORK_DATABASE_URL: ${{ secrets.NETWORK_DATABASE_URL }}
          NOTIFICATION_DATABASE_URL: ${{ secrets.NOTIFICATION_DATABASE_URL }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          OAUTH_FRONTEND_LOGIN_URL: ${{ secrets.OAUTH_FRONTEND_LOGIN_URL }}
          OAUTH_FRONTEND_REDIRECT_URL: ${{ secrets.OAUTH_FRONTEND_REDIRECT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_CALLBACK_URL: ${{ secrets.GH_CALLBACK_URL }}
          VIDEOSDK_API_KEY: ${{ secrets.VIDEOSDK_API_KEY }}
          VIDEOSDK_SECRET: ${{ secrets.VIDEOSDK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sed -i 's/\r$//' helm/navi/render-deploy-values.sh
          sh helm/navi/render-deploy-values.sh > deploy-values.yaml

      - name: Helm lint
        run: |
          helm lint helm/navi -f helm/navi/values.yaml -f deploy-values.yaml

      - name: Deploy
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          kubectl --insecure-skip-tls-verify delete pods -n "${NS}" \
            --field-selector status.phase=Failed \
            --ignore-not-found --grace-period=0 2>/dev/null || true
          helm upgrade --install navi helm/navi \
            --kube-insecure-skip-tls-verify \
            --namespace "${NS}" \
            --create-namespace \
            -f helm/navi/values.yaml \
            -f deploy-values.yaml \
            --wait --timeout 15m

      - name: Wait for db-init
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${K8S_NAMESPACE:-navi}"
          KUBECTL="kubectl --insecure-skip-tls-verify"
          if $KUBECTL get job navi-db-init -n "${NS}" >/dev/null 2>&1; then
            $KUBECTL wait --for=condition=complete job/navi-db-init \
              -n "${NS}" --timeout=300s
          fi

      - name: Show pods
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          kubectl --insecure-skip-tls-verify get pods -n "${K8S_NAMESPACE:-navi}"
