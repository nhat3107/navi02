name: Deploy to Kubernetes

# Manual CD: Actions → Deploy to Kubernetes → set image_tag (e.g. latest or sha-abc1234).
# Prerequisite: CI pushed images to Docker Hub on main.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: true
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Build and push db-init
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile.db-init
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/navi-db-init:${{ inputs.image_tag }}

      - name: Render deploy values
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          API_HOST: ${{ secrets.API_HOST }}
          USER_APP_HOST: ${{ secrets.USER_APP_HOST }}
          ADMIN_APP_HOST: ${{ secrets.ADMIN_APP_HOST }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          OAUTH_FRONTEND_LOGIN_URL: ${{ secrets.OAUTH_FRONTEND_LOGIN_URL }}
          OAUTH_FRONTEND_REDIRECT_URL: ${{ secrets.OAUTH_FRONTEND_REDIRECT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL: ${{ secrets.GITHUB_CALLBACK_URL }}
          VIDEOSDK_API_KEY: ${{ secrets.VIDEOSDK_API_KEY }}
          VIDEOSDK_SECRET: ${{ secrets.VIDEOSDK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          chmod +x helm/navi/render-deploy-values.sh
          helm/navi/render-deploy-values.sh > /tmp/deploy-values.yaml

      - name: Helm upgrade
        run: |
          helm upgrade --install navi ./helm/navi \
            --namespace "${{ secrets.K8S_NAMESPACE || 'navi' }}" \
            --create-namespace \
            -f helm/navi/values.yaml \
            -f /tmp/deploy-values.yaml \
            --wait --timeout 15m

      - name: Wait for db-init
        run: |
          kubectl wait --for=condition=complete job/navi-db-init \
            -n "${{ secrets.K8S_NAMESPACE || 'navi' }}" --timeout=300s
