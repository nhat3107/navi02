name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy (e.g. latest or sha-<commit>)
        required: true
        default: latest

concurrency:
  group: deploy-k8s-manual
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Helm deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Resolve namespace
        id: ns
        run: echo "value=${{ secrets.K8S_NAMESPACE || 'navi' }}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push db-init image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile.db-init
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/navi-db-init:${{ steps.tag.outputs.value }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Build database connection strings
        id: db
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
        run: |
          AUTH_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/auth_db"
          USER_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/user_db"
          CHAT_DB="mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/chat_db?authSource=admin"
          NETWORK_DB_URL="mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/network_db?authSource=admin"
          NOTIFICATION_DB_URL="mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/notification_db?authSource=admin"
          {
            echo "auth<<EOF"
            echo "$AUTH_DATABASE_URL"
            echo "EOF"
            echo "user<<EOF"
            echo "$USER_DATABASE_URL"
            echo "EOF"
            echo "chat<<EOF"
            echo "$CHAT_DB"
            echo "EOF"
            echo "network<<EOF"
            echo "$NETWORK_DB_URL"
            echo "EOF"
            echo "notification<<EOF"
            echo "$NOTIFICATION_DB_URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Helm deploy values
        env:
          REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ steps.tag.outputs.value }}
          NAMESPACE: ${{ steps.ns.outputs.value }}
          API_HOST: ${{ secrets.API_HOST }}
          USER_APP_HOST: ${{ secrets.USER_APP_HOST }}
          ADMIN_APP_HOST: ${{ secrets.ADMIN_APP_HOST }}
          AUTH_DATABASE_URL: ${{ steps.db.outputs.auth }}
          USER_DATABASE_URL: ${{ steps.db.outputs.user }}
          CHAT_DB: ${{ steps.db.outputs.chat }}
          NETWORK_DB_URL: ${{ steps.db.outputs.network }}
          NOTIFICATION_DB_URL: ${{ steps.db.outputs.notification }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          OAUTH_FRONTEND_LOGIN_URL: ${{ secrets.OAUTH_FRONTEND_LOGIN_URL }}
          OAUTH_FRONTEND_REDIRECT_URL: ${{ secrets.OAUTH_FRONTEND_REDIRECT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL: ${{ secrets.GITHUB_CALLBACK_URL }}
          VIDEOSDK_API_KEY: ${{ secrets.VIDEOSDK_API_KEY }}
          VIDEOSDK_SECRET: ${{ secrets.VIDEOSDK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install --quiet pyyaml
          python3 <<'PY'
          import os, yaml

          def s(key):
              return os.environ.get(key, "")

          values = {
              "registry": {
                  "dockerhubUsername": s("REGISTRY"),
                  "tag": s("TAG"),
              },
              "namespace": s("NAMESPACE"),
              "createNamespace": True,
              "ingress": {
                  "enabled": True,
                  "apiHost": s("API_HOST"),
                  "userAppHost": s("USER_APP_HOST"),
                  "adminAppHost": s("ADMIN_APP_HOST"),
              },
              "secrets": {
                  "jwtAccessSecret": s("JWT_ACCESS_SECRET"),
                  "jwtResetSecret": s("JWT_RESET_SECRET"),
                  "postgresUser": s("POSTGRES_USER"),
                  "postgresPassword": s("POSTGRES_PASSWORD"),
                  "mongoRootUser": s("MONGO_ROOT_USER"),
                  "mongoRootPassword": s("MONGO_ROOT_PASSWORD"),
                  "authDatabaseUrl": s("AUTH_DATABASE_URL"),
                  "userDatabaseUrl": s("USER_DATABASE_URL"),
                  "chatDb": s("CHAT_DB"),
                  "networkDbUrl": s("NETWORK_DB_URL"),
                  "notificationDbUrl": s("NOTIFICATION_DB_URL"),
                  "frontendOrigin": s("FRONTEND_ORIGIN"),
                  "oauthFrontendLoginUrl": s("OAUTH_FRONTEND_LOGIN_URL"),
                  "oauthFrontendRedirectUrl": s("OAUTH_FRONTEND_REDIRECT_URL"),
                  "googleClientId": s("GOOGLE_CLIENT_ID"),
                  "googleClientSecret": s("GOOGLE_CLIENT_SECRET"),
                  "googleCallbackUrl": s("GOOGLE_CALLBACK_URL"),
                  "githubClientId": s("GITHUB_CLIENT_ID"),
                  "githubClientSecret": s("GITHUB_CLIENT_SECRET"),
                  "githubCallbackUrl": s("GITHUB_CALLBACK_URL"),
                  "videosdkApiKey": s("VIDEOSDK_API_KEY"),
                  "videosdkSecret": s("VIDEOSDK_SECRET"),
                  "emailUser": s("EMAIL_USER"),
                  "emailPass": s("EMAIL_PASS"),
                  "frontendUrl": s("FRONTEND_URL"),
                  "cloudinaryCloudName": s("CLOUDINARY_CLOUD_NAME"),
                  "cloudinaryApiKey": s("CLOUDINARY_API_KEY"),
                  "cloudinaryApiSecret": s("CLOUDINARY_API_SECRET"),
                  "openaiApiKey": s("OPENAI_API_KEY"),
              },
          }

          with open("/tmp/navi-deploy-values.yaml", "w", encoding="utf-8") as f:
              yaml.dump(values, f, default_flow_style=False, allow_unicode=True)
          PY

      - name: Helm upgrade
        run: |
          NS="${{ steps.ns.outputs.value }}"
          helm upgrade --install navi ./helm/navi \
            --namespace "$NS" \
            --create-namespace \
            -f helm/navi/values.yaml \
            -f /tmp/navi-deploy-values.yaml \
            --wait \
            --timeout 15m

      - name: Wait for db-init hook
        run: |
          NS="${{ steps.ns.outputs.value }}"
          kubectl wait --for=condition=complete job/navi-db-init -n "$NS" --timeout=300s
