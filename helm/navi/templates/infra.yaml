{{- $ns := include "navi.namespace" . -}}
{{- if .Values.infra.postgres.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ $ns }}
data:
  init-databases.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE user_db;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ $ns }}
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ $ns }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.infra.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: [/bin/sh, -c, 'pg_isready -U "$POSTGRES_USER"']
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.infra.postgres.storage }}
{{- end }}
{{- if .Values.infra.mongo.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: {{ $ns }}
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ $ns }}
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: {{ .Values.infra.mongo.image }}
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: [mongosh, --quiet, --eval, "db.adminCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.infra.mongo.storage }}
{{- end }}
{{- if .Values.infra.kafka.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: broker
  namespace: {{ $ns }}
spec:
  ports:
    - port: 9092
      targetPort: 9092
    - port: 9093
      targetPort: 9093
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.infra.kafka.image }}
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: broker,controller }
            - { name: KAFKA_LISTENERS, value: PLAINTEXT://:9092,CONTROLLER://:9093 }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: PLAINTEXT://broker:9092 }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: PLAINTEXT }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: CONTROLLER }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: 1@broker:9093 }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_NUM_PARTITIONS, value: "3" }
          readinessProbe:
            exec:
              command: [/bin/sh, -c, /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1]
            initialDelaySeconds: 30
            periodSeconds: 10
{{- end }}
