apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "navi.configMapName" . }}
  namespace: {{ include "navi.namespace" . }}
  labels:
    {{- include "navi.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  KAFKA_BROKERS: {{ .Values.config.kafkaBrokers | quote }}
  PORT: {{ .Values.config.port | quote }}
  CHAT_HTTP_PORT: {{ .Values.config.chatHttpPort | quote }}
  CLOUDINARY_UPLOAD_FOLDER: {{ .Values.config.cloudinaryUploadFolder | quote }}
  CLOUDINARY_NETWORK_FOLDER: {{ .Values.config.cloudinaryNetworkFolder | quote }}
  CLOUDINARY_CHAT_FOLDER: {{ .Values.config.cloudinaryChatFolder | quote }}
