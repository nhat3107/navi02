apiVersion: v1
kind: ConfigMap
metadata:
  name: navi-config
  namespace: {{ include "navi.namespace" . }}
data:
  KAFKA_BROKERS: {{ include "navi.kafkaBrokers" . | quote }}
{{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ include "navi.namespace" . }}
data:
  01-init-databases.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE user_db;
