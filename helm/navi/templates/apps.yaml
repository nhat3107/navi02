{{- $root := . -}}
{{- $ns := include "navi.namespace" . -}}
{{- range .Values.apps }}
{{- if .expose }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
  selector:
    app: {{ .name }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      {{- if and $root.Values.infra.kafka.enabled $root.Values.infra.kafka.colocateApps }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: kafka
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if and $root.Values.infra.kafka.enabled .usesKafka }}
      initContainers:
        - name: wait-broker
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 90); do
                nc -z broker 9092 && exit 0
                sleep 2
              done
              echo "broker:9092 not reachable after 180s"
              exit 1
      {{- end }}
      containers:
        - name: {{ .name }}
          image: {{ include "navi.image" (dict "root" $root "name" .image) }}
          imagePullPolicy: IfNotPresent
          {{- if .port }}
          ports:
            - containerPort: {{ .port }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: navi-config
            - secretRef:
                name: navi-secrets
          {{- if .databaseUrlKey }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: {{ .databaseUrlKey }}
          {{- end }}
{{- end }}
