{{- $ns := include "navi.namespace" . -}}
{{- range .Values.apps }}
{{- if .expose }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
  selector:
    app: {{ .name }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      {{- $isFrontend := or (eq .name "user-app") (eq .name "admin-app") }}
      {{- if not $isFrontend }}
      initContainers:
        {{- if $.Values.infra.postgres.enabled }}
        - name: wait-postgres
          image: busybox:1.36
          command: [/bin/sh, -c, "until nc -z postgres 5432; do sleep 3; done"]
        {{- end }}
        {{- if $.Values.infra.mongo.enabled }}
        - name: wait-mongo
          image: busybox:1.36
          command: [/bin/sh, -c, "until nc -z mongo 27017; do sleep 3; done"]
        {{- end }}
        {{- if $.Values.infra.kafka.enabled }}
        - name: wait-kafka
          image: busybox:1.36
          command: [/bin/sh, -c, "until nc -z broker 9092; do sleep 3; done"]
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .name }}
          image: {{ include "navi.image" (dict "root" $ "name" .image) }}
          {{- if .port }}
          ports:
            - containerPort: {{ .port }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: navi-config
            - secretRef:
                name: navi-secrets
          {{- if .databaseUrlKey }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: {{ .databaseUrlKey }}
          {{- end }}
          {{- if eq .name "api-gateway" }}
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- else if .expose }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
{{- end }}
