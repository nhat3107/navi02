{{- $ns := include "navi.namespace" . -}}
{{- range .Values.apps }}
{{- if .expose }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  ports:
    - name: http
      port: {{ .port }}
      targetPort: {{ .port }}
  selector:
    app: {{ .name }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      dnsPolicy: ClusterFirst
      containers:
        - name: {{ .name }}
          image: {{ include "navi.image" (dict "root" $ "name" .image) }}
          imagePullPolicy: IfNotPresent
          {{- if .port }}
          ports:
            - containerPort: {{ .port }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: navi-config
            - secretRef:
                name: navi-secrets
          {{- if .databaseUrlKey }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: navi-secrets
                  key: {{ .databaseUrlKey }}
          {{- end }}
          {{- if eq .name "api-gateway" }}
          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
          {{- else if eq .name "chat-service" }}
          startupProbe:
            tcpSocket:
              port: 4030
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 4030
            periodSeconds: 10
            timeoutSeconds: 3
          {{- else if .expose }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
{{- end }}
