{{- /*
Internal microservices — Deployments without public Services (Kafka-only except chat HTTP).
*/}}
{{- $root := . -}}
{{- $config := include "navi.configMapName" . -}}
{{- $secret := include "navi.secretName" . -}}
{{- $ns := include "navi.namespace" . -}}

{{- $services := list
  (dict "name" "auth-service" "image" .Values.images.authService "replicas" .Values.replicas.authService "databaseKey" "AUTH_DATABASE_URL")
  (dict "name" "user-service" "image" .Values.images.userService "replicas" .Values.replicas.userService "databaseKey" "USER_DATABASE_URL")
  (dict "name" "chat-service" "image" .Values.images.chatService "replicas" .Values.replicas.chatService "databaseKey" "")
  (dict "name" "network-service" "image" .Values.images.networkService "replicas" .Values.replicas.networkService "databaseKey" "")
  (dict "name" "notification-service" "image" .Values.images.notificationService "replicas" .Values.replicas.notificationService "databaseKey" "")
  (dict "name" "ai-service" "image" .Values.images.aiService "replicas" .Values.replicas.aiService "databaseKey" "")
-}}

{{- range $svc := $services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $svc.name }}
    {{- include "navi.labels" $root | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
      containers:
        - name: {{ $svc.name }}
          image: {{ include "navi.image" (dict "root" $root "name" $svc.image) }}
          envFrom:
            - configMapRef:
                name: {{ $config }}
            - secretRef:
                name: {{ $secret }}
          {{- if $svc.databaseKey }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: {{ $svc.databaseKey }}
          {{- end }}
{{- end }}
