{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: navi-db-init
  namespace: {{ include "navi.namespace" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: [/bin/sh, -c, "until nc -z postgres 5432; do sleep 3; done"]
      containers:
        - name: db-init
          image: {{ include "navi.image" (dict "root" . "svc" (dict "imageName" .Values.dbInit.imageName)) }}
          envFrom:
            - secretRef:
                name: navi-secrets
{{- end }}
