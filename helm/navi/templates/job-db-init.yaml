{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: navi-db-init
  namespace: {{ include "navi.namespace" . }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      {{- if .Values.infra.postgres.enabled }}
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: [/bin/sh, -c, "until nc -z postgres 5432; do sleep 3; done"]
      {{- end }}
      containers:
        - name: db-init
          image: {{ include "navi.image" (dict "root" . "name" .Values.dbInit.image) }}
          envFrom:
            - secretRef:
                name: navi-secrets
{{- end }}
