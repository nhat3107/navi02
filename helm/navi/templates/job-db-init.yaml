{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: navi-db-init
  namespace: {{ include "navi.namespace" . }}
  annotations:
    helm.sh/hook: post-install{{- if .Values.dbInit.runOnUpgrade }},post-upgrade{{- end }}
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: {{ include "navi.image" (dict "root" . "svc" (dict "imageName" .Values.dbInit.imageName)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          env:
            - name: SEED_ADMIN
              value: {{ .Values.dbInit.seedAdmin | ternary "true" "false" | quote }}
          envFrom:
            - secretRef:
                name: navi-secrets
{{- end }}
