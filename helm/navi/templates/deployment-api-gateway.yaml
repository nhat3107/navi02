apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ include "navi.namespace" . }}
  labels:
    app: api-gateway
    {{- include "navi.labels" . | nindent 4 }}
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ include "navi.namespace" . }}
  labels:
    app: api-gateway
    {{- include "navi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.apiGateway }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: {{ include "navi.image" (dict "root" . "name" .Values.images.apiGateway) }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "navi.configMapName" . }}
            - secretRef:
                name: {{ include "navi.secretName" . }}
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
