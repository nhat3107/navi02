# Default values for the Navi chart.
# Production secrets and hosts are injected by GitHub Actions CD — see helm/README.md.

nameOverride: ""
fullnameOverride: ""

namespace: navi
createNamespace: true

registry:
  dockerhubUsername: example
  tag: latest

ingress:
  enabled: true
  className: nginx
  apiHost: api.example.com
  userAppHost: app.example.com
  adminAppHost: admin.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

config:
  nodeEnv: production
  kafkaBrokers: broker:9092
  port: "3000"
  chatHttpPort: "4030"
  cloudinaryUploadFolder: navi/onboarding
  cloudinaryNetworkFolder: navi/network
  cloudinaryChatFolder: navi/chat

# Populated at deploy time (GitHub Secrets → helm --values). Do not commit real values.
secrets:
  jwtAccessSecret: ""
  jwtResetSecret: ""
  postgresUser: postgres
  postgresPassword: ""
  mongoRootUser: root
  mongoRootPassword: ""
  authDatabaseUrl: ""
  userDatabaseUrl: ""
  chatDb: ""
  networkDbUrl: ""
  notificationDbUrl: ""
  frontendOrigin: ""
  oauthFrontendLoginUrl: ""
  oauthFrontendRedirectUrl: ""
  googleClientId: ""
  googleClientSecret: ""
  googleCallbackUrl: ""
  githubClientId: ""
  githubClientSecret: ""
  githubCallbackUrl: ""
  videosdkApiKey: ""
  videosdkSecret: ""
  emailUser: ""
  emailPass: ""
  frontendUrl: ""
  cloudinaryCloudName: ""
  cloudinaryApiKey: ""
  cloudinaryApiSecret: ""
  openaiApiKey: ""

images:
  apiGateway: navi-api-gateway
  authService: navi-auth-service
  userService: navi-user-service
  chatService: navi-chat-service
  networkService: navi-network-service
  notificationService: navi-notification-service
  aiService: navi-ai-service
  dbInit: navi-db-init
  userApp: navi-user-app
  adminApp: navi-admin-app

infra:
  postgres:
    enabled: true
    image: postgres:16-alpine
    storage: 5Gi
  mongo:
    enabled: true
    image: mongo:7
    storage: 5Gi
  kafka:
    enabled: true
    image: apache/kafka:latest

replicas:
  apiGateway: 1
  authService: 1
  userService: 1
  chatService: 1
  networkService: 1
  notificationService: 1
  aiService: 1
  userApp: 1
  adminApp: 1

dbInit:
  enabled: true
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
