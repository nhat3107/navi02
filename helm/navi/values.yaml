# Base chart values — CD merges `/tmp/cd-values.yaml` (image, ingress, secrets) on deploy.

namespace: navi

image:
  registry: example
  tag: latest

# HTTP only — no TLS in this chart. Point DNS at the ingress controller.
ingress:
  enabled: true
  className: nginx
  apiHost: api.example.com
  userAppHost: app.example.com
  adminAppHost: admin.example.com

# CD sets kafka.brokers to broker Service ClusterIP (e.g. 10.43.0.5:9092) after deploy.
kafka:
  brokers: ""

config:
  NODE_ENV: production
  KAFKAJS_NO_PARTITIONER_WARNING: "1"
  PORT: "3000"
  CHAT_HTTP_PORT: "4030"
  COOKIE_SECURE: "false"
  CLOUDINARY_UPLOAD_FOLDER: navi/onboarding
  CLOUDINARY_NETWORK_FOLDER: navi/network
  CLOUDINARY_CHAT_FOLDER: navi/chat

# Key/value env secrets (K8s secret `navi-secrets`). Filled at deploy time.
# Database URLs: AUTH_DATABASE_URL, USER_DATABASE_URL, CHAT_DATABASE_URL,
# NETWORK_DATABASE_URL, NOTIFICATION_DATABASE_URL → mapped to DATABASE_URL per app.
secrets: {}

apps:
  - name: api-gateway
    image: navi-api-gateway
    port: 3000
    expose: true
  - name: auth-service
    image: navi-auth-service
    databaseUrlKey: AUTH_DATABASE_URL
  - name: user-service
    image: navi-user-service
    databaseUrlKey: USER_DATABASE_URL
  - name: chat-service
    image: navi-chat-service
    port: 4030
    databaseUrlKey: CHAT_DATABASE_URL
  - name: network-service
    image: navi-network-service
    databaseUrlKey: NETWORK_DATABASE_URL
  - name: notification-service
    image: navi-notification-service
    databaseUrlKey: NOTIFICATION_DATABASE_URL
  - name: ai-service
    image: navi-ai-service
  - name: user-app
    image: navi-user-app
    port: 80
    expose: true
  - name: admin-app
    image: navi-admin-app
    port: 80
    expose: true

# Postgres and Mongo run outside the cluster — set full URLs in `secrets` at deploy time.
infra:
  postgres:
    enabled: false
    image: postgres:16-alpine
    storage: 5Gi
  mongo:
    enabled: false
    image: mongo:7
    storage: 5Gi
  kafka:
    enabled: true
    image: apache/kafka:3.9.0
    # Single-node KRaft; keep stable after first deploy.
    clusterId: MkU3OEVBNTcwNTJENDM2Qk

# Prisma schema push against external Postgres (disable if you manage schemas separately).
dbInit:
  enabled: true
  image: navi-db-init
