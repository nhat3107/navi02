# Defaults — production overrides via `render-deploy-values.sh` or `-f deploy-values.yaml`.

namespace: navi

image:
  registry: example
  tag: latest

ingress:
  enabled: true
  className: nginx
  apiHost: api.example.com
  userAppHost: app.example.com
  adminAppHost: admin.example.com

config:
  NODE_ENV: production
  KAFKA_BROKERS: broker:9092
  PORT: "3000"
  CHAT_HTTP_PORT: "4030"
  CLOUDINARY_UPLOAD_FOLDER: navi/onboarding
  CLOUDINARY_NETWORK_FOLDER: navi/network
  CLOUDINARY_CHAT_FOLDER: navi/chat

# Key/value env secrets (K8s secret `navi-secrets`). Filled at deploy time.
secrets: {}

apps:
  - name: api-gateway
    image: navi-api-gateway
    port: 3000
    expose: true
  - name: auth-service
    image: navi-auth-service
    databaseUrlKey: AUTH_DATABASE_URL
  - name: user-service
    image: navi-user-service
    databaseUrlKey: USER_DATABASE_URL
  - name: chat-service
    image: navi-chat-service
  - name: network-service
    image: navi-network-service
  - name: notification-service
    image: navi-notification-service
  - name: ai-service
    image: navi-ai-service
  - name: user-app
    image: navi-user-app
    port: 80
    expose: true
  - name: admin-app
    image: navi-admin-app
    port: 80
    expose: true

infra:
  postgres:
    enabled: true
    image: postgres:16-alpine
    storage: 5Gi
  mongo:
    enabled: true
    image: mongo:7
    storage: 5Gi
  kafka:
    enabled: true
    image: apache/kafka:latest

dbInit:
  enabled: true
  image: navi-db-init
