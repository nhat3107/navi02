# Base chart values — CD merges deploy overrides (image registry, secrets) at deploy time.
# Override locally: helm upgrade --install navi ./helm/navi -f helm/navi/values.yaml -f deploy-values.yaml

namespace: navi

image:
  registry: dockerhub-user   # DOCKERHUB_USERNAME — set by CD
  tag: latest

# Non-secret env shared by backend services (ConfigMap `navi-config`).
# ConfigMap is applied after Secret in envFrom so these override secret keys.
config:
  NODE_ENV: production
  KAFKAJS_NO_PARTITIONER_WARNING: "1"
  USE_PUBLIC_DNS: "false"
  PORT: "3000"
  CHAT_HTTP_PORT: "4030"
  COOKIE_SECURE: "false"
  CLOUDINARY_UPLOAD_FOLDER: navi/onboarding
  CLOUDINARY_NETWORK_FOLDER: navi/network
  CLOUDINARY_CHAT_FOLDER: navi/chat

# Postgres and Mongo run outside the cluster — set full URLs in `secrets` at deploy time.
secrets: {}

dbInit:
  enabled: true
  imageName: navi-db-init

# All workloads — infra + microservices + frontends.
# Reusable deployment.yaml / service.yaml iterate this list.
services:
  # --- Infrastructure (Kafka in-cluster) ---

  - name: broker
    externalImage: true
    image: bitnami/kafka:3.7.0
    port: 9092
    strategy:
      type: Recreate
    command:
      - /bin/sh
      - -ec
      - |
        if [ ! -f /data/meta.properties ]; then
          /opt/kafka/bin/kafka-storage.sh format -t "${CLUSTER_ID}" -c /opt/kafka/config/kraft/server.properties
        fi
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties
    env:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_LOG_DIRS: /data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    readinessProbe:
      tcpSocket:
        port: 9092
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
      - name: data
        mountPath: /data
    volumes:
      - name: data
        emptyDir: {}
    resources:
      requests:
        memory: 384Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: "1"

  # --- Backend microservices ---

  - name: api-gateway
    imageName: navi-api-gateway
    port: 3000
    app: true
    waitForKafka: true

  - name: auth-service
    imageName: navi-auth-service
    app: true
    waitForKafka: true
    databaseUrlKey: AUTH_DATABASE_URL

  - name: user-service
    imageName: navi-user-service
    app: true
    waitForKafka: true
    databaseUrlKey: USER_DATABASE_URL

  - name: chat-service
    imageName: navi-chat-service
    port: 4030
    app: true
    waitForKafka: true
    databaseUrlKey: CHAT_DATABASE_URL

  - name: network-service
    imageName: navi-network-service
    app: true
    waitForKafka: true
    databaseUrlKey: NETWORK_DATABASE_URL

  - name: notification-service
    imageName: navi-notification-service
    app: true
    waitForKafka: true
    databaseUrlKey: NOTIFICATION_DATABASE_URL

  - name: ai-service
    imageName: navi-ai-service
    app: true
    waitForKafka: true

  # --- Frontends ---

  - name: user-app
    imageName: navi-user-app
    port: 80

  - name: admin-app
    imageName: navi-admin-app
    port: 80
